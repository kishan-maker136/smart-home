<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCentral | Full-Stack Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; --success: #10b981; --glass: rgba(255, 255, 255, 0.7); }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .container { width: 95%; max-width: 1100px; height: 85vh; background: var(--glass); backdrop-filter: blur(10px); border-radius: 24px; display: flex; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid rgba(255,255,255,0.4); }
        .sidebar { width: 250px; padding: 40px 20px; border-right: 1px solid rgba(0,0,0,0.05); }
        .nav-item { padding: 12px 20px; margin: 8px 0; border-radius: 12px; cursor: pointer; transition: 0.3s; color: #64748b; }
        .nav-item.active { background: var(--accent); color: white; }

        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.4s; }

        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #e2e8f0; font-family: inherit; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: #f8fafc; color: #64748b; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }

        .toggle-btn { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px; }
        .toggle-btn.on { border-color: var(--accent); background: #f5f3ff; }
        .dot { width: 10px; height: 10px; background: #cbd5e1; border-radius: 50%; }
        .toggle-btn.on .dot { background: var(--success); box-shadow: 0 0 8px var(--success); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div style="font-size: 1.4rem; font-weight: 600; color: var(--accent); margin-bottom: 40px;">🏠 SmartCentral</div>
        <div class="nav-item active" onclick="switchPage('dashboard', this)">Dashboard</div>
        <div class="nav-item" onclick="switchPage('admin', this)">Data Inspector</div>
    </div>

    <div class="content">
        <section id="dashboard" class="page-section active">
            <h1>Command Center</h1>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <h3>Provision Device</h3>
                    <input type="text" id="newDevName" placeholder="Device Name (e.g. Living Room AC)">
                    <select id="newDevRoom">
                        <option value="1">Room 1: Living Area</option>
                        <option value="2">Room 2: Kitchen</option>
                        <option value="3">Room 3: Bedroom</option>
                    </select>
                    <select id="newDevType">
                        <option value="Appliance">🔌 Appliance</option>
                        <option value="Lighting">💡 Lighting</option>
                        <option value="Security">🛡️ Security</option>
                    </select>
                    <button onclick="submitToBackend()" style="width:100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 10px;">Sync to MySQL</button>
                </div>
                <div class="card">
                    <h3>Quick Toggles</h3>
                    <div id="dashboard-toggles">No devices provisioned.</div>
                </div>
            </div>
        </section>

        <section id="admin" class="page-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>MySQL Dataset</h1>
                <button onclick="loadTuples()" style="background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">Refresh SQL</button>
            </div>
            <div class="card" style="padding: 0; overflow: hidden;">
                <table>
                    <thead><tr><th>ID</th><th>Device Name</th><th>Type</th><th>Status</th></tr></thead>
                    <tbody id="tuple-body"></tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
